name: Deploy Internal Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. ビルド実行 (署名付き)
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 2. サーバーへ転送
      - name: Rename and Copy APK
        run: |
          VERSION=${GITHUB_REF_NAME:-v0.0.0}
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/sigman-${VERSION}.apk

      # 3. サーバー上でファイル名を固定して上書き
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "app/build/outputs/apk/debug/sigman-*.apk"
          target: "/var/www/download-app/sigman/"
          strip_components: 5