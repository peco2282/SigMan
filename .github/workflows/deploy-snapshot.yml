name: Deploy Snapshot Release APK

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 署名鍵を Base64 から復元
      - name: Decode Keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/signing-key.jks

      # 1. ビルド実行 (署名付き, バージョンを SNAPSHOT に固定)
      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          GITHUB_REF_NAME: SNAPSHOT
          RELEASE_STORE_FILE: signing-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 2. ファイル名の変更
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/sigman-SNAPSHOT.apk

      # 3. サーバー上でファイル名を固定して上書き
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "app/build/outputs/apk/release/sigman-SNAPSHOT.apk"
          target: "/var/www/download-app/sigman/"
          strip_components: 5
